[package]
name = "cdpm"
edition = "2024"         # edition = "legacy" to use legacy (pre-2024) Move
# license = ""           # e.g., "MIT", "GPL", "Apache 2.0"
# authors = ["..."]      # e.g., ["Joe Smith (joesmith@noemail.com)", "John Snow (johnsnow@noemail.com)"]

[dependencies]
# Patched cetusdlmm: identical to upstream `mainnet-v0.8.0` except for one
# missing `use sui::vec_map;` import inside a `#[test_only]` helper
# (`partner.move:193`) that prevents `sui move test` from ever building this
# package. Production behaviour is unchanged. Promoted from `[dev-dependencies]`
# to `[dependencies]` so that `sui-prover` (asymptotic.tech) — which always
# activates dev-deps — does not trigger a "Conflicting regular and dev
# overrides" resolver error. Drop once upstream releases the patch.
cetusdlmm = { local = "/tmp/cetus-dlmm-patched/packages/dlmm", override = true }
integer_mate = { git = "https://github.com/CetusProtocol/integer-mate.git", rev = "mainnet-v1.3.0", override = true }
move_stl = { git = "https://github.com/CetusProtocol/move-stl.git", rev = "mainnet-v1.3.0", override = true }
protocol = { local = "../sui-lending-protocol/contracts/protocol", override = true }
x = { local = "../sui-lending-protocol/contracts/libs/x", override = true }
kai_sav = { local = "../kai-contracts/kai/sav/core" }
