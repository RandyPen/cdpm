[package]
name = "cdpm_specs"
edition = "2024.beta"
# Specs are only compiled by `sui-prover` (asymptotic.tech). Do NOT add this
# package to a regular `sui move build` — the prover toolchain injects its own
# `Sui` and `MoveStdlib` overrides (see SPEC.md). Regular sui CLI cannot
# compile `#[spec(...)]` / `#[spec_only]` attributes.

[dependencies]
# `cdpm` is the package under verification. Its Move.toml carries the full
# dependency closure (Sui, MoveStdlib, cetusdlmm, integer-mate, move-stl,
# Scallop, X). The prover replaces the framework deps at verify time.
cdpm = { local = ".." }
Prover = { local = "../../sui-prover/packages/prover", override = true }

[dev-dependencies]
# Mirror cdpm's deps with PascalCase keys + `rename-from` so the
# asymptotic resolver doesn't reject the lowercase address bindings cdpm
# uses. Sui CLI tolerates lowercase dep keys matching `[addresses]`;
# sui-prover requires the dep key to match the upstream `[package].name`.
# These dev-deps make sui-prover see PascalCase names while cdpm's own
# Move.toml keeps the lowercase form sui CLI requires.
CetusDlmm = { local = "/tmp/cetus-dlmm-patched/packages/dlmm", override = true, rename-from = "cetusdlmm" }
IntegerMate = { git = "https://github.com/CetusProtocol/integer-mate.git", rev = "mainnet-v1.3.0", override = true, rename-from = "integer_mate" }
MoveSTL = { git = "https://github.com/CetusProtocol/move-stl.git", rev = "mainnet-v1.3.0", override = true, rename-from = "move_stl" }
ScallopProtocol = { local = "../../sui-lending-protocol/contracts/protocol", override = true, rename-from = "protocol" }
X = { local = "../../sui-lending-protocol/contracts/libs/x", override = true, rename-from = "x" }

[addresses]
cdpm_specs = "0x0"
